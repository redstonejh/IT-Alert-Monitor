<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESET Alert Monitor</title>
  <script>
    (() => {
      try {
        const theme = localStorage.getItem("dashboard-theme");
        if (theme === "dark") document.documentElement.dataset.theme = "dark";
      } catch {}
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css?v=20260520-theme40">
</head>
<body>
  <main class="page">
    {% if error %}
      <section class="notice error">{{ error }}</section>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  <div class="toast-stack" aria-live="polite" aria-atomic="true"></div>
  <script src="/static/app.js?v=20260520-theme5"></script>
</body>
</html>
